      <div class="container-menu">
        <div class="container-menu-transparency">

            <button type="button" id="menu-button-fase-1-1" class="menu-button menu-button-fase" disabled=true></button>

            <button type="button" id="menu-button-fase-2-4" class="menu-button menu-button-fase" disabled=true></button>
        </div>
      </div>
      <div id="container-mecanica-dragdrop" class="container-mecanica-dragdrop">
        <div class="tutorial">

              <div class="barra-menu"></div>

        </div>
        <div id="container-letters" class="container-letters"></div>
      </div>
      <div class="container-end">
        Fim
