<!DOCTYPE HTML>
<html>
  <head>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="anim.css">
    <meta name="viewport" content= "width=device-width, height=device-height, user-scalable=no">
    <meta charset="UTF-8" />
  </head>
  <body>
    <script src="capa_config_auto.js"></script>
    <script src="capa.js"></script>
    <div class="container-geral">
      <p style="position:absolute;z-index:10000;top:20px;left:11px">1.2</p>
      <div class="container-splash-screen">
        <div class="container-splash-screen-logo"></div>
        <button type="button" id="menu-button-comecar" class="menu-button menu-button-comecar"></button>
      </div>
      <div id="container-intro-1" class="container-intro">
        <div class="bg-transparency">
          <div id="container-intro-image-1" class="container-intro-image">
            <button type="button" id="menu-button-avancar-intro-1" class="menu-button menu-button-avancar"></button>
          </div>
        </div>
      </div>
      <div id="container-intro-2" class="container-intro">
        <div class="bg-transparency">
          <div id="container-intro-image-2" class="container-intro-image">
            <button type="button" id="menu-button-avancar-intro-2" class="menu-button menu-button-avancar"></button>
          </div>
        </div>
      </div>
      <div id="container-game-over" class="container-intro">
          <div class="bg-transparency">
            <div id="container-game-over-image" class="container-game-over-image">
              <button type="button" id="menu-button-voltar-game-over" class="menu-button menu-button-voltar"></button>
            </div>
          </div>
        </div>
      <div class="container-menu">
        <div class="container-menu-transparency">
            <button type="button" id="menu-button-fase-1-0" class="menu-button menu-button-fase"></button>
            <button type="button" id="menu-button-fase-1-1" class="menu-button menu-button-fase" disabled=true></button>
            <button type="button" id="menu-button-fase-1-2" class="menu-button menu-button-fase" disabled=true></button>
            <button type="button" id="menu-button-fase-1-3" class="menu-button menu-button-fase" disabled=true></button>
            <button type="button" id="menu-button-fase-1-4" class="menu-button menu-button-fase" disabled=true></button>
            
            <button type="button" id="menu-button-fase-2-0" class="menu-button menu-button-fase" disabled=true></button>
            <button type="button" id="menu-button-fase-2-1" class="menu-button menu-button-fase" disabled=true></button>
            <button type="button" id="menu-button-fase-2-2" class="menu-button menu-button-fase" disabled=true></button>
            <button type="button" id="menu-button-fase-2-3" class="menu-button menu-button-fase" disabled=true></button>
            <button type="button" id="menu-button-fase-2-4" class="menu-button menu-button-fase" disabled=true></button>
        </div>
      </div>
      <div id="container-mecanica-dragdrop" class="container-mecanica-dragdrop">
        <div class="tutorial">
          <div class="bg-transparency">
            <div class="tutorial-image">
                <button type="button" id="menu-button-avancar-tutorial" class="menu-button menu-button-avancar"></button>
            </div>              
          </div>
        </div>
        <div id="drops-wrapper" class="drops-wrapper">
            <div id="drops-wrapper-internal" class="drops-wrapper-internal">
              <div id="drops-bg" class="drops-bg"></div>
              <div id="container-drops" class="container-drops"></div>
            </div>
        </div>
        <div id="container-letters" class="container-letters hide-answers"></div>
        <button type="button" id="menu-button-show-hide-answers" class="menu-button menu-button-show-hide-answers menu-button-show-hide-answers--show"></button>
      </div>
      <div class="container-end">
        <button type="button" id="menu-button-voltar-end" class="menu-button menu-button-voltar"></button>
      </div>
    </div>

    <audio id="audio-bubble" src="audio/bubble.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-correct" src="audio/correct.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-error" src="audio/error.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>

    <script src="jquery-1.7.2.min.js"></script>
    <script src="jquery-ui.min.js"></script>
    <script src="jquery.ui.touch-punch.js"></script>
    <script src="stages.js"></script>
    <script src="main.js"></script>
