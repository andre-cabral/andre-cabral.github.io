<!DOCTYPE HTML>
<html>
  <head>
      <link rel="stylesheet" href="external/reset.css">
    <link rel="stylesheet" href="main.css">
    <meta name="viewport" content= "width=device-width, height=device-height, user-scalable=no">
    <meta charset="UTF-8" />
  </head>
  <body>
    <script src="capa_config_auto.js"></script>
    <div class="container-geral">
      <div id="container-splash-screen" class="container-splash-screen">
        <div class="container-splash-screen-logo"></div>
        <button type="button" id="menu-button-comecar" class="menu-button menu-button-comecar"></button>
      </div>
      
      <div id="container-tutorial" class="container-tutorial-blur">
        <div class="bg-transparency-clearer">
          <div class="container-tutorial">
            <button type="button" id="button-avancar-tutorial" class="menu-button menu-button-avancar"></button>
          </div>
        </div>
      </div>
      
      <div id="container-jogo" class="container-jogo">
        <div id="container-jogo-bg" class="container-jogo-bg">
          <div id="base-top-container" class="game-place game-place-base-top"><div></div></div>
          <div id="igreja-container" class="game-place game-place-igreja"><div></div></div>
          <div id="mercado-container" class="game-place game-place-mercado"><div></div></div>
          <div id="transporte-container" class="game-place game-place-transporte"><div></div></div>
          <div id="transporte-top-container" class="game-place game-place-transporte-top"><div></div></div>
          <div id="mercado-top-container" class="game-place game-place-mercado-top"><div></div></div>
          <div id="industria-container" class="game-place game-place-industria"><div></div></div>
          <div id="moradia-container" class="game-place game-place-moradia"><div></div></div>
          <div class="game-buttons-container">
            <button type="button" id="button-game-igreja" class="game-button game-button-igreja">
              <span class="game-button-text game-button-text-igreja">
                <span class="game-button-internal game-button-internal-igreja">
                  <span class="game-button-text-internal game-button-text-internal-igreja"></span>
                </span>
              </span>
            </button>
            <button type="button" id="button-game-mercado" class="game-button game-button-mercado">
              <span class="game-button-text game-button-text-mercado">
                <span class="game-button-internal game-button-internal-mercado">
                  <span class="game-button-text-internal game-button-text-internal-mercado"></span>
                </span>
              </span>
            </button>
            <button type="button" id="button-game-transporte" class="game-button game-button-big game-button-transporte">
              <span class="game-button-text game-button-text-transporte">
                <span class="game-button-internal game-button-internal-transporte">
                  <span class="game-button-text-internal game-button-text-internal-transporte"></span>
                </span>
              </span>
            </button>
            <button type="button" id="button-game-industria" class="game-button game-button-industria">
              <span class="game-button-text game-button-text-industria">
                <span class="game-button-internal game-button-internal-industria">
                  <span class="game-button-text-internal game-button-text-internal-industria"></span>
                </span>
              </span>
            </button>
            <button type="button" id="button-game-moradia" class="game-button game-button-moradia">
              <span class="game-button-text game-button-text-moradia">
                <span class="game-button-internal game-button-internal-moradia">
                  <span class="game-button-text-internal game-button-text-internal-moradia"></span>
                </span>
              </span>
            </button>
          </div>
        </div>
      </div>
      
      <div id="container-end" class="container-end">
        <div id="end-text" class="end-text">
          <img class="end-1-text end-text-img" src="img/end1.png" />
          <img class="end-2-text end-text-img" src="img/end2.png" />
          <img class="end-3-text end-text-img" src="img/end3.png" />
          <img class="end-4-text end-text-img" src="img/end4.png" />
          <img class="end-5-text end-text-img" src="img/end5.png" />
          <img class="end-6-text end-text-img" src="img/end6.png" />
        </div>
        <button type="button" id="button-voltar-end" class="menu-button menu-button-voltar"></button>
      </div>
      
    </div>

    <audio id="audio-button2" src="audio/button2.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-deliver" src="audio/deliver.mp3" preload="auto">

    </audio>
    <audio id="audio-walklong" src="audio/walklong.mp3" preload="auto" loop>

    </audio>
