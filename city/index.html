<!DOCTYPE HTML>
<html>
  <head>
      <link rel="stylesheet" href="external/reset.css">
    <link rel="stylesheet" href="main.css">
    <meta name="viewport" content= "width=device-width, height=device-height, user-scalable=no">
    <meta charset="UTF-8" />
  </head>
  <body>
    <script src="capa_config_auto.js"></script>
    <div class="container-geral">
      <div id="container-splash-screen" class="container-splash-screen bg-transparency">
        <div class="container-splash-screen-logo"></div>
        <button type="button" id="menu-button-comecar" class="menu-button menu-button-comecar"></button>
      </div>
      
      <div id="container-tutorial" class="bg-transparency">
        <div class="container-tutorial">
          <button type="button" id="button-avancar-tutorial" class="menu-button menu-button-avancar"></button>
        </div>
      </div>
      
      <div id="container-jogo" class="container-jogo">
        <div id="container-jogo-bg" class="container-jogo-bg">
          <div id="igreja-container" class="game-place game-place-igreja"></div>
          <div id="mercado-container" class="game-place game-place-mercado"></div>
          <div id="transporte-container" class="game-place game-place-transporte"></div>
          <div id="industria-container" class="game-place game-place-industria"></div>
          <div id="moradia-container" class="game-place game-place-moradia"></div>
          <div class="game-buttons-container">
            <button type="button" id="button-game-igreja" class="game-button game-button-igreja"><span class="game-button-text game-button-text-igreja"></span></button>
            <button type="button" id="button-game-mercado" class="game-button game-button-mercado"><span class="game-button-text game-button-text-mercado"></span></button>
            <button type="button" id="button-game-transporte" class="game-button game-button-big game-button-transporte"><span class="game-button-text game-button-text-transporte"></span></button>
            <button type="button" id="button-game-industria" class="game-button game-button-industria"><span class="game-button-text game-button-text-industria"></span></button>
            <button type="button" id="button-game-moradia" class="game-button game-button-moradia"><span class="game-button-text game-button-text-moradia"></span></button>
          </div>
        </div>
      </div>
      
      <div id="container-end" class="container-end bg-transparency">
        <div class="bg-transparency">
          <button type="button" id="button-voltar-end" class="menu-button menu-button-voltar"></button>
        </div>
      </div>
      
    </div>

    <audio id="audio-button2" src="audio/button2.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-deliver" src="audio/deliver.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-drag" src="audio/drag.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-drop" src="audio/drop.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-end" src="audio/end.mp3" preload="auto">
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-walk" src="audio/walk.mp3" preload="auto" loop>
      Your browser does not support the <code>audio</code> element.
    </audio>
    <audio id="audio-walklong" src="audio/walklong.mp3" preload="auto" loop>
      Your browser does not support the <code>audio</code> element.
    </audio>
    
    <script src="external/jquery-1.7.2.min.js"></script>
    <script src="capa.js"></script>
    <script src="stages.js"></script>
    <script src="main.js"></script>
    
    <div style="display:none!important">
      <img src="img/atlas.png" />
      <img src="img/base0.png" />
      <img src="img/base1.png" />
      <img src="img/base2.png" />
      <img src="img/base3.png" />
      <img src="img/bg.png" />
      <img src="img/check.png" />
      <img src="img/disabled.png" />
      <img src="img/end.png" />
      <img src="img/intro.png" />

      <img src="places/igreja1.png" />
      <img src="places/igreja2.png" />
      <img src="places/igreja3.png" />
      <img src="places/industria1.png" />
      <img src="places/industria2.png" />
      <img src="places/industria3.png" />
      <img src="places/mercado1.png" />
      <img src="places/mercado2.png" />
      <img src="places/mercado3.png" />
      <img src="places/transporte1.png" />
      <img src="places/transporte2.png" />
      <img src="places/transporte3.png" />
    </div>
  </body>
</html>
