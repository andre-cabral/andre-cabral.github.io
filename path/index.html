<!DOCTYPE HTML>
<html>
  <head>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="anim.css">

  <body>
    <script src="capa_config_auto.js"></script>
    <div class="container-geral">
      <!--<p style="position:absolute;z-index:10000;top:20px;left:11px">1.4</p>-->
      <p id="log-area" style="position:absolute;z-index:10000;top:50px;left:11px"></p>
      <div id="container-splash-screen" class="container-splash-screen bg-transparency">
        <div class="container-splash-screen-logo"></div>
        <button type="button" id="menu-button-comecar" class="menu-button menu-button-comecar"></button>
      </div>
      
      <div id="container-tutorial-encomendas" class="container-tutorial bg-transparency">
        <button type="button" id="button-avancar-tutorial-encomendas" class="menu-button menu-button-avancar"></button>
      </div>
      
      <div id="container-encomendas" class="container-encomendas bg-transparency">
        <div class="encomendas-drag-drop">
          <div id="container-drops" class="container-drops"></div>
          <div id="container-draggables" class="container-draggables"></div>
        </div>
        <button type="button" id="button-avancar-encomendas" class="menu-button menu-button-avancar" disabled="true"></button>
      </div>
      
      <div id="container-tutorial-caminhos" class="container-tutorial bg-transparency">
        <button type="button" id="button-avancar-tutorial-caminhos" class="menu-button menu-button-avancar"></button>
      </div>
      
      <div id="container-jogo" class="container-jogo bg-transparency">
        <div id="container-jogo-bg" class="container-jogo-bg">
          <div id="game-board" class="game-board">
            <div id="game-grid" class="game-grid"></div>
          </div>
        </div>
        <p class="lives-text" id="lives"></p>
        <p class="lives-text-error" id="lives-error"></p>
        <button type="button" id="button-avancar-jogo" class="menu-button menu-button-avancar"></button>
      </div>
      
      <div id="container-end" class="container-end bg-transparency">
        <div id="end-stars" class="end-stars"></div>
        <button type="button" id="button-voltar-end" class="menu-button menu-button-voltar"></button>
      </div>
      
    </div>
